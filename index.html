<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Matching Helper Grid</title>
    <style>
        :root {
            --bg-color: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            --text-color: #1b4332;
            --container-bg: rgba(255, 255, 255, 0.3);
            --controls-bg: rgba(255, 255, 255, 0.35);
            --cell-bg: rgba(255, 255, 255, 0.2);
            --cell-border: rgba(27, 67, 50, 0.4);
            --cell-hover-border: #2d6a4f;
            --btn-bg: #2d6a4f;
            --btn-hover: #1b4332;
            --btn-text: #ffffff;
            --clear-btn-bg: #bb3e03;
            --clear-btn-hover: #9b2226;
            --lock-btn-bg: #0077b6;
            --lock-btn-hover: #023e8a;
            --subtext-color: #1b4332;
        }

        body.dark-mode {
            --bg-color: #434c54;
            --text-color: #d8f3dc;
            --container-bg: rgba(40, 45, 50, 0.4);
            --controls-bg: rgba(40, 45, 50, 0.45);
            --cell-bg: rgba(25, 30, 35, 0.3);
            --cell-border: rgba(216, 243, 220, 0.3);
            --cell-hover-border: #8fbcbb;
            --btn-bg: #4c566a;
            --btn-hover: #3b4252;
            --btn-text: #ffffff;
            --clear-btn-bg: #bf616a;
            --clear-btn-hover: #ac535c;
            --lock-btn-bg: #5e6472;
            --lock-btn-hover: #4c5361;
            --subtext-color: #b7e4c7;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            background: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            box-sizing: border-box;
            width: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
        }
        
        .controls, .palette, .grid-wrapper {
            background: var(--container-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            touch-action: auto;
        }
        label { margin-right: 4px; font-weight: bold; font-size: 12px; }
        input[type="number"] { 
            width: 50px; 
            padding: 4px; 
            margin-right: 6px; 
            background-color: var(--cell-bg);
            color: var(--text-color);
            border: 1px solid var(--cell-border);
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        button { 
            padding: 5px 10px; 
            background-color: var(--btn-bg); 
            color: var(--btn-text); 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background-color 0.2s, filter 0.2s;
            margin-top: 4px;
            font-size: 11px;
            touch-action: auto;
        }
        button:hover { background-color: var(--btn-hover); filter: brightness(1.1); }
        
        .clear-btn {
            background-color: var(--clear-btn-bg);
            margin-left: 4px;
        }
        .clear-btn:hover {
            background-color: var(--clear-btn-hover);
        }

        .lock-btn {
            background-color: var(--lock-btn-bg);
            margin-left: 4px;
        }
        .lock-btn:hover {
            background-color: var(--lock-btn-hover);
        }

        .theme-toggle {
            margin-left: 4px;
            background-color: #4c566a;
        }

        .main-app {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 95vw;
            max-width: 800px;
            box-sizing: border-box;
            touch-action: auto;
        }

        .grid-wrapper {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
        }

        #grid-container {
            display: grid;
            gap: 4px;
            transition: background-color 0.3s, border-color 0.3s;
            margin: 0 auto;
        }

        .palette {
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 360px;
            box-sizing: border-box;
            touch-action: auto;
        }

        .swatch {
            width: 35px;
            height: 35px;
            border-radius: 4px;
            cursor: grab;
            border: 2px solid transparent;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            touch-action: none;
            object-fit: cover;
        }
        .swatch:active { cursor: grabbing; }
        .swatch.selected {
            border: 2px solid #fff;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }
        body:not(.dark-mode) .swatch.selected { border: 2px solid #000; }

        .eraser-swatch {
            background-color: rgba(255, 255, 255, 0.3);
            border: 2px solid var(--cell-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
        }
        body.dark-mode .eraser-swatch {
            background-color: rgba(0, 0, 0, 0.2);
        }

        .cell {
            border: 1.5px solid var(--cell-border);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--cell-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: background-color 0.1s, border-color 0.3s;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .cell.locked {
            cursor: not-allowed;
        }
        .cell:not(.locked):hover { border-color: var(--cell-hover-border); transform: scale(1.02); }
        
        #floating-preview {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
            display: none;
            border: 2px solid #fff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 8px 14px 20px rgba(0, 0, 0, 0.45);
            transform: translate(-50%, -50%) scale(1.15);
            transition: box-shadow 0.15s ease, transform 0.15s ease;
        }

        p { color: var(--subtext-color); text-align: center; max-width: 400px; font-weight: bold; text-shadow: 0 1px 3px rgba(255,255,255,0.5); margin: 0; font-size: 12px; }
    </style>
</head>
<body>

    <div id="floating-preview"></div>

    <div class="controls">
        <label for="rows">Rows:</label>
        <input type="number" id="rows" min="1" max="10" value="4">
        <label for="cols">Columns:</label>
        <input type="number" id="cols" min="1" max="10" value="4">
        <br>
        <button onclick="generateGrid()">Generate / Reset Grid</button>
        <button class="clear-btn" onclick="clearAll()">Clear All</button>
        <button id="lock-btn" class="lock-btn" onclick="toggleLock()">🔒 Lock Grid</button>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Toggle Dark/Light</button>
    </div>

    <p>Brought to you by an <b>ISTJ</b></p>

    <div class="main-app">
        <div class="grid-wrapper">
            <div id="grid-container"></div>
        </div>

        <div class="palette">
            <img src="image1.png" class="swatch" data-item="image1.png" alt="Card 1" draggable="true" onclick="selectColor(this, 'image1.png')" ondragstart="drag(event, 'image1.png')">
            <img src="image2.png" class="swatch" data-item="image2.png" alt="Card 2" draggable="true" onclick="selectColor(this, 'image2.png')" ondragstart="drag(event, 'image2.png')">
            <img src="image3.png" class="swatch" data-item="image3.png" alt="Card 3" draggable="true" onclick="selectColor(this, 'image3.png')" ondragstart="drag(event, 'image3.png')">
            <img src="image4.png" class="swatch" data-item="image4.png" alt="Card 4" draggable="true" onclick="selectColor(this, 'image4.png')" ondragstart="drag(event, 'image4.png')">
            <img src="image5.png" class="swatch" data-item="image5.png" alt="Card 5" draggable="true" onclick="selectColor(this, 'image5.png')" ondragstart="drag(event, 'image5.png')">
            <img src="image6.png" class="swatch" data-item="image6.png" alt="Card 6" draggable="true" onclick="selectColor(this, 'image6.png')" ondragstart="drag(event, 'image6.png')">
            <img src="image7.png" class="swatch" data-item="image7.png" alt="Card 7" draggable="true" onclick="selectColor(this, 'image7.png')" ondragstart="drag(event, 'image7.png')">
            <img src="image8.png" class="swatch" data-item="image8.png" alt="Card 8" draggable="true" onclick="selectColor(this, 'image8.png')" ondragstart="drag(event, 'image8.png')">
            <div class="swatch eraser-swatch" data-item="" onclick="selectColor(this, '')" title="Eraser" draggable="true" ondragstart="drag(event, '')">🧹</div>
        </div>
    </div>

    <script>
        let currentlySelectedColor = null;
        let draggedColor = null;
        let activePointerId = null;
        let isGridLocked = false;
        const floatingPreview = document.getElementById('floating-preview');

        function generateGrid() {
            const rows = parseInt(document.getElementById('rows').value) || 1;
            const cols = parseInt(document.getElementById('cols').value) || 1;
            const container = document.getElementById('grid-container');
            
            // Save layout state to localStorage
            localStorage.setItem('savedRows', rows);
            localStorage.setItem('savedCols', cols);
            
            const availableWidth = window.innerWidth * 0.88;
            const gap = 4;
            
            let cellSize = Math.floor((availableWidth - (cols - 1) * gap) / cols);
            cellSize = Math.min(Math.max(cellSize, 35), 75);

            container.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
            container.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
            container.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (isGridLocked) cell.classList.add('locked');
                    cell.style.width = `${cellSize}px`;
                    cell.style.height = `${cellSize}px`;
                    
                    cell.addEventListener('dragover', (e) => {
                        if (isGridLocked) return;
                        e.preventDefault();
                    });
                    cell.addEventListener('drop', (e) => {
                        if (isGridLocked) return;
                        e.preventDefault();
                        const item = e.dataTransfer.getData('item');
                        applyItemToCell(cell, item);
                    });

                    cell.addEventListener('click', () => {
                        if (isGridLocked) return;
                        applyItemToCell(cell, currentlySelectedColor);
                    });

                    container.appendChild(cell);
                }
            }
        }

        function applyItemToCell(cell, itemVal) {
            if (itemVal !== null && itemVal !== undefined) {
                if (itemVal.includes('.')) {
                    cell.style.backgroundImage = `url('${itemVal}')`;
                    cell.style.backgroundColor = '';
                } else if (itemVal === '') {
                    cell.style.backgroundImage = '';
                    cell.style.backgroundColor = '';
                } else {
                    cell.style.backgroundImage = '';
                    cell.style.backgroundColor = itemVal;
                }
            }
        }

        document.querySelectorAll('.swatch').forEach(swatch => {
            swatch.addEventListener('pointerdown', (e) => {
                if (isGridLocked) return;
                if (activePointerId !== null) return;
                activePointerId = e.pointerId;
                
                draggedColor = swatch.getAttribute('data-item');
                
                if (draggedColor && draggedColor.includes('.')) {
                    floatingPreview.style.backgroundImage = `url('${draggedColor}')`;
                    floatingPreview.style.backgroundColor = '';
                } else {
                    floatingPreview.style.backgroundImage = '';
                    floatingPreview.style.backgroundColor = draggedColor || 'rgba(255, 255, 255, 0.3)';
                }
                
                floatingPreview.style.display = 'block';
                swatch.setPointerCapture(e.pointerId);

                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
                currentlySelectedColor = null;
                
                e.preventDefault();
            });
        });

        window.addEventListener('pointermove', (e) => {
            if (isGridLocked) return;
            if (activePointerId !== e.pointerId) return;
            if (draggedColor !== null) {
                floatingPreview.style.left = e.clientX + 'px';
                floatingPreview.style.top = e.clientY + 'px';
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (isGridLocked) return;
            if (activePointerId !== e.pointerId) return;
            
            if (draggedColor !== null) {
                floatingPreview.style.display = 'none';
                
                const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
                
                if (dropTarget && dropTarget.classList.contains('cell') && !dropTarget.classList.contains('locked')) {
                    applyItemToCell(dropTarget, draggedColor);
                }
                
                e.target.releasePointerCapture?.(e.pointerId);
                draggedColor = null;
                activePointerId = null;
            }
        });
        
        window.addEventListener('pointercancel', (e) => {
            if (activePointerId === e.pointerId) {
                floatingPreview.style.display = 'none';
                draggedColor = null;
                activePointerId = null;
            }
        });

        function selectColor(element, color) {
            if (isGridLocked) return;
            if (element.classList.contains('selected')) {
                element.classList.remove('selected');
                currentlySelectedColor = null;
            } else {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
                element.classList.add('select-ui');
                element.classList.add('selected');
                currentlySelectedColor = color;
            }
        }

        function drag(event, item) {
            if (isGridLocked) {
                event.preventDefault();
                return;
            }
            event.dataTransfer.setData('item', item);
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            currentlySelectedColor = null;
        }

        function clearAll() {
            if (isGridLocked) return;
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.style.backgroundImage = '';
                cell.style.backgroundColor = '';
            });
        }

        function toggleLock() {
            isGridLocked = !isGridLocked;
            const lockBtn = document.getElementById('lock-btn');
            const cells = document.querySelectorAll('.cell');
            
            if (isGridLocked) {
                lockBtn.innerHTML = '🔓 Unlock Grid';
                lockBtn.style.backgroundColor = '#2a9d8f';
                cells.forEach(cell => cell.classList.add('locked'));
            } else {
                lockBtn.innerHTML = '🔒 Lock Grid';
                lockBtn.style.backgroundColor = 'var(--lock-btn-bg)';
                cells.forEach(cell => cell.classList.remove('locked'));
            }
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            currentlySelectedColor = null;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        // Ignore height-only resizes (scrolling address bar) to avoid accidental grid regeneration
        let windowWidth = window.innerWidth;
        window.addEventListener('resize', () => {
            if (window.innerWidth !== windowWidth) {
                windowWidth = window.innerWidth;
                generateGrid();
            }
        });

        // Load saved settings on page load
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('savedRows')) {
                document.getElementById('rows').value = localStorage.getItem('savedRows');
            }
            if (localStorage.getItem('savedCols')) {
                document.getElementById('cols').value = localStorage.getItem('savedCols');
            }
            generateGrid();
        });
    </script>
</body>
</html>
