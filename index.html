<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Matching Helper Grid</title>
    <style>
        :root {
            --bg-color: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            --text-color: #1b4332;
            --container-bg: rgba(255, 255, 255, 0.3);
            --controls-bg: rgba(255, 255, 255, 0.35);
            --cell-bg: rgba(255, 255, 255, 0.2);
            --cell-border: rgba(27, 67, 50, 0.4);
            --cell-hover-border: #2d6a4f;
            --btn-bg: #2d6a4f;
            --btn-hover: #1b4332;
            --btn-text: #ffffff;
            --clear-btn-bg: #bb3e03;
            --clear-btn-hover: #9b2226;
            --subtext-color: #1b4332;
        }

        body.dark-mode {
            --bg-color: #434c54;
            --text-color: #d8f3dc;
            --container-bg: rgba(40, 45, 50, 0.4);
            --controls-bg: rgba(40, 45, 50, 0.45);
            --cell-bg: rgba(25, 30, 35, 0.3);
            --cell-border: rgba(216, 243, 220, 0.3);
            --cell-hover-border: #8fbcbb;
            --btn-bg: #4c566a;
            --btn-hover: #3b4252;
            --btn-text: #ffffff;
            --clear-btn-bg: #bf616a;
            --clear-btn-hover: #ac535c;
            --subtext-color: #b7e4c7;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            background: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            box-sizing: border-box;
            width: 100%;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        
        .controls, .palette, .grid-wrapper {
            background: var(--container-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }
        label { margin-right: 4px; font-weight: bold; font-size: 12px; }
        input[type="number"] { 
            width: 50px; 
            padding: 4px; 
            margin-right: 6px; 
            background-color: var(--cell-bg);
            color: var(--text-color);
            border: 1px solid var(--cell-border);
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }
        button { 
            padding: 5px 10px; 
            background-color: var(--btn-bg); 
            color: var(--btn-text); 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: background-color 0.2s, filter 0.2s;
            margin-top: 4px;
            font-size: 11px;
        }
        button:hover { background-color: var(--btn-hover); filter: brightness(1.1); }
        
        .clear-btn {
            background-color: var(--clear-btn-bg);
            margin-left: 4px;
        }
        .clear-btn:hover {
            background-color: var(--clear-btn-hover);
        }

        .theme-toggle {
            margin-left: 4px;
            background-color: #4c566a;
        }

        .main-app {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            width: 95vw;
            max-width: 800px;
            box-sizing: border-box;
        }

        .grid-wrapper {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        #grid-container {
            display: grid;
            gap: 4px;
            transition: background-color 0.3s, border-color 0.3s;
            margin: 0 auto;
        }

        .palette {
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            max-width: 360px;
            box-sizing: border-box;
        }
