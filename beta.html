<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Matching Helper Grid</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; }
        #grid-container { display: grid; gap: 5px; margin-top: 10px; }
        .cell { width: 50px; height: 50px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; }
        .palette { display: flex; gap: 10px; margin-top: 20px; }
        .swatch { width: 50px; height: 50px; cursor: pointer; border: 2px solid transparent; }
        .swatch.selected { border-color: blue; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="number" id="rows" value="4" placeholder="Rows">
        <input type="number" id="cols" value="4" placeholder="Cols">
        <button onclick="generateGrid()">Generate Grid</button>
        <button onclick="clearGrid()">Clear All</button>
    </div>

    <div id="grid-container"></div>

    <div class="palette" id="palette">
        </div>

    <script>
        let selectedItem = null;

        function generateGrid() {
            const rows = document.getElementById('rows').value;
            const cols = document.getElementById('cols').value;
            const container = document.getElementById('grid-container');
            container.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
            container.innerHTML = '';
            for(let i = 0; i < rows * cols; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => { if(selectedItem) cell.style.backgroundImage = `url('${selectedItem}')`; };
                container.appendChild(cell);
            }
        }

        function select(el, item) {
            selectedItem = item;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
        }

        function clearGrid() {
            document.querySelectorAll('.cell').forEach(c => c.style.backgroundImage = '');
        }

        generateGrid();
    </script>
</body>
</html>
